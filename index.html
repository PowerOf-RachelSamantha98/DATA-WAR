<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XAUUSD WAR - Dashboard Pribadi</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        /* Lapisan UI Utama di Atas Grafis 3D */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Supaya tidak menghalangi rotasi grafis 3D */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            padding: 15px;
        }

        /* 1. Bagian Atas: Judul & Informasi Harga */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 10, 10, 0.85);
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid #222;
            pointer-events: auto;
        }
        .title {
            color: #fff;
            font-weight: bold;
            font-size: 18px;
            letter-spacing: 2px;
        }
        .price-box {
            color: #ffd700;
            font-size: 20px;
            font-weight: bold;
        }

        /* 2. Bagian Tengah: Jendela Info Pasukan Sisi Kanan & Kiri */
        .middle-container {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-grow: 1;
            margin: 15px 0;
        }
        .army-window {
            width: 140px;
            background: rgba(5, 5, 5, 0.9);
            border: 1px solid #222;
            border-radius: 6px;
            padding: 12px;
            color: #fff;
            font-size: 11px;
            pointer-events: auto;
        }
        .army-window h3 {
            margin: 0 0 8px 0;
            font-size: 12px;
            letter-spacing: 1px;
            text-align: center;
            padding-bottom: 5px;
            border-bottom: 2px solid;
        }
        .left-panel h3 { color: #00ffcc; border-bottom-color: #00ffcc; }
        .right-panel h3 { color: #ff3366; border-bottom-color: #ff3366; }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        .stat-val { font-weight: bold; }
        .win-probability {
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            margin-top: 10px;
            padding-top: 5px;
            border-top: 1px dashed #444;
        }

        /* 3. Bagian Bawah: Jendela Catatan Log Transaksi Berjalan */
        .bottom-container {
            width: 100%;
            background: rgba(5, 5, 5, 0.9);
            border: 1px solid #222;
            border-radius: 6px;
            height: 110px;
            box-sizing: border-box;
            padding: 10px;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
        }
        .log-title {
            color: #888;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .log-display {
            flex-grow: 1;
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            display: flex;
            flex-direction: column;
        }
        /* Mengatur scrollbar bawaan browser biar tetap minimalis */
        .log-display::-webkit-scrollbar { width: 4px; }
        .log-display::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

        /* Format Teks Warna Log */
        .log-entry { margin-bottom: 3px; }
        .log-buy { color: #00ffcc; }
        .log-sell { color: #ff3366; }
    </style>
</head>
<body>

    <div id="ui-layer">
        
        <div class="header">
            <div class="title">⚔️ XAUUSD WAR</div>
            <div class="price-box" id="live-price">$2334.50</div>
        </div>

        <div class="middle-container">
            <div class="army-window left-panel">
                <h3>GREEN ARMY</h3>
                <div class="stat-row"><span>SOLDIERS:</span><span class="stat-val" id="b-soldiers">0</span></div>
                <div class="stat-row"><span>TANKS:</span><span class="stat-val" id="b-tanks">0</span></div>
                <div class="stat-row"><span>KILLS:</span><span class="stat-val" id="b-kills">0</span></div>
                <div class="win-probability" style="color: #00ffcc;">WIN PROB: <span id="buy-rate">50%</span></div>
            </div>

            <div class="army-window right-panel">
                <h3>RED ARMY</h3>
                <div class="stat-row"><span>SOLDIERS:</span><span class="stat-val" id="s-soldiers">0</span></div>
                <div class="stat-row"><span>TANKS:</span><span class="stat-val" id="s-tanks">0</span></div>
                <div class="stat-row"><span>KILLS:</span><span class="stat-val" id="s-kills">0</span></div>
                <div class="win-probability" style="color: #ff3366;">WIN PROB: <span id="sell-rate">50%</span></div>
            </div>
        </div>

        <div class="bottom-container">
            <div class="log-title">Live Market Activity Log</div>
            <div class="log-display" id="log-box">
                </div>
        </div>

    </div>

    <script>
        // --- 1. CONFIG GRAPHICS (THREE.JS) ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050505, 0.015);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        const gridHelper = new THREE.GridHelper(200, 50, 0x333333, 0x1a1a1a);
        gridHelper.position.y = -2;
        scene.add(gridHelper);

        camera.position.set(0, 14, 22);
        camera.lookAt(0, 2, 0);

        const projectiles = [];

        // Fungsi pemicu kemunculan objek 3D di area simulasi perang
        function spawnUnit(type) {
            const geometry = new THREE.BoxGeometry(1, 1, 1);
            const material = new THREE.MeshBasicMaterial({ 
                color: type === 'BUY' ? 0x00ffcc : 0xff3366 
            });
            const cube = new THREE.Mesh(geometry, material);
            
            cube.position.x = type === 'BUY' ? -20 : 20;
            cube.position.z = (Math.random() - 0.5) * 8;
            cube.position.y = 0;
            
            scene.add(cube);
            projectiles.push({ mesh: cube, type: type, speed: type === 'BUY' ? 0.45 : -0.45 });
        }

        function animate() {
            requestAnimationFrame(animate);
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i];
                p.mesh.position.x += p.speed;
                p.mesh.rotation.y += 0.05;

                if (Math.abs(p.mesh.position.x) > 22) {
                    scene.remove(p.mesh);
                    projectiles.splice(i, 1);
                }
            }
            renderer.render(scene, camera);
        }
        animate();

        // --- 2. LOGIKA DATA DAN PENCATATAN LIVE ACTIVITY LOG ---
        let basePrice = 2334.50;
        let totalBuy = 0;
        let totalSell = 0;

        // Variabel penampung jumlah data militer di jendela samping
        let statData = {
            buyUnits: 0, buyTanks: 0, buyKills: 0,
            sellUnits: 0, sellTanks: 0, sellKills: 0
        };

        // Fungsi pembantu untuk membuat teks waktu lokal [HH:MM:SS]
        function getTimestamp() {
            const now = new Date();
            return now.toTimeString().split(' ')[0];
        }

        // Fungsi utama pengisi teks catatan log di bagian jendela bawah
        function addLogEntry(type, amount, price) {
            const logBox = document.getElementById('log-box');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type === 'BUY' ? 'log-buy' : 'log-sell'}`;
            
            // Format tampilan baris: [14:33:05] ORDER MASUK BUY $2334.70 (Vol: 1.5)
            entry.innerText = `[${getTimestamp()}] ORDER MASUK ${type} $${price.toFixed(2)} (Vol: ${amount})`;
            
            logBox.appendChild(entry);

            // Menjaga layar log otomatis menggulung ke posisi terbawah
            logBox.scrollTop = logBox.scrollHeight;

            // Batasi jumlah teks log di HTML agar memori browser HP tidak penuh/lag
            if (logBox.children.length > 25) {
                logBox.removeChild(logBox.firstChild);
            }
        }

        // Jalankan siklus pemrosesan simulasi aktivitas data berkala
        setInterval(() => {
            const type = Math.random() > 0.47 ? 'BUY' : 'SELL';
            const change = (Math.random() * 0.3).toFixed(2);
            const volume = (Math.random() * 4 + 0.1).toFixed(1); // Simulasi jumlah lot muatan transaksi
            
            if (type === 'BUY') {
                basePrice += parseFloat(change);
                totalBuy++;
                statData.buyUnits += Math.floor(Math.random() * 5) + 1;
                if(Math.random() > 0.8) statData.buyTanks += 1;
                if(Math.random() > 0.5) statData.sellKills += Math.floor(Math.random() * 3);
            } else {
                basePrice -= parseFloat(change);
                totalSell++;
                statData.sellUnits += Math.floor(Math.random() * 5) + 1;
                if(Math.random() > 0.8) statData.sellTanks += 1;
                if(Math.random() > 0.5) statData.buyKills += Math.floor(Math.random() * 3);
            }

            // Picu animasi peluru jatuh di peta perang 3D
            spawnUnit(type);

            // Kirim rekaman data ke panel jendela log bawah
            addLogEntry(type, volume, basePrice);

            // Sinkronisasi data teks ke jendela samping kiri dan kanan
            document.getElementById('live-price').innerText = `$${basePrice.toFixed(2)}`;
            
            document.getElementById('b-soldiers').innerText = statData.buyUnits.toLocaleString();
            document.getElementById('b-tanks').innerText = statData.buyTanks;
            document.getElementById('b-kills').innerText = statData.buyKills.toLocaleString();

            document.getElementById('s-soldiers').innerText = statData.sellUnits.toLocaleString();
            document.getElementById('s-tanks').innerText = statData.sellTanks;
            document.getElementById('s-kills').innerText = statData.sellKills.toLocaleString();

            // Hitung kalkulasi rasio persentase pertahanan masing-masing kubu
            const totalTrades = totalBuy + totalSell;
            const buyRate = Math.round((totalBuy / totalTrades) * 100);
            document.getElementById('buy-rate').innerText = `${buyRate}%`;
            document.getElementById('sell-rate').innerText = `${100 - buyRate}%`;

        }, 400); // Interval pembaruan data diperbarui konstan setiap 400ms

        // Menjaga perbandingan skala kanvas 3D tidak rusak saat orientasi HP diputar
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
