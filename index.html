<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XAUUSD WAR - Live Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        /* UI Overlay di atas Canvas 3D */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Agar tidak mengganggu rotasi 3D */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            pointer-events: auto;
        }
        .title {
            color: #fff;
            font-weight: bold;
            font-size: 20px;
            letter-spacing: 2px;
        }
        .price-box {
            color: #ffd700;
            font-size: 22px;
            font-weight: bold;
        }
        .stats-container {
            display: flex;
            justify-content: space-between;
            margin-top: auto;
            pointer-events: auto;
        }
        .army-card {
            width: 45%;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 8px;
            color: white;
            border-top: 5px solid;
        }
        .green-army { border-color: #00ffcc; }
        .red-army { border-color: #ff3366; }
        .win-rate {
            font-size: 28px;
            font-weight: bold;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="header">
            <div class="title">⚔️ XAUUSD WAR</div>
            <div class="price-box" id="live-price">$2334.50</div>
        </div>

        <div class="stats-container">
            <div class="army-card green-army">
                <div>BULLISH ARMY (BUY)</div>
                <div class="win-rate" id="buy-rate">50%</div>
            </div>
            <div class="army-card red-army">
                <div>BEARISH ARMY (SELL)</div>
                <div class="win-rate" id="sell-rate">50%</div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. SETUP THREE.JS (DUNIA 3D) ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050505, 0.015);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Tambah Pencahayaan
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // Membuat "Medan Perang" Sederhana (Grid)
        const gridHelper = new THREE.GridHelper(200, 50, 0x444444, 0x222222);
        gridHelper.position.y = -2;
        scene.add(gridHelper);

        camera.position.set(0, 15, 25);
        camera.lookAt(0, 0, 0);

        // --- 2. LOGIKA MEMUNCULKAN PASUKAN (PELURU/LAKON 3D) ---
        const projectiles = [];

        function spawnUnit(type) {
            // Kita gunakan kubus sederhana sebagai representasi pasukan agar ringan
            const geometry = new THREE.BoxGeometry(1, 1, 1);
            const material = new THREE.MeshBasicMaterial({ 
                color: type === 'BUY' ? 0x00ffcc : 0xff3366 
            });
            const cube = new THREE.Mesh(geometry, material);
            
            // Atur posisi awal (Kiri untuk Buy, Kanan untuk Sell)
            cube.position.x = type === 'BUY' ? -20 : 20;
            cube.position.z = (Math.random() - 0.5) * 10;
            cube.position.y = 0;
            
            scene.add(cube);
            projectiles.push({ mesh: cube, type: type, speed: type === 'BUY' ? 0.4 : -0.4 });
        }

        // --- 3. ANIMASI LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            // Gerakkan kubus pasukan agar saling menyerang di tengah
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i];
                p.mesh.position.x += p.speed;
                p.mesh.rotation.y += 0.05;

                // Hapus objek jika sudah melewati medan perang agar HP tidak lag
                if (Math.abs(p.mesh.position.x) > 25) {
                    scene.remove(p.mesh);
                    projectiles.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        }
        animate();

        // --- 4. SIMULASI DATA TICK XAU/USD (REAL-TIME SIMULATION) ---
        // Nanti bagian ini bisa kamu ganti dengan koneksi WebSocket Broker aslimu
        let basePrice = 2334.50;
        let buyCount = 0;
        let totalCount = 0;

        setInterval(() => {
            const direction = Math.random() > 0.48 ? 'BUY' : 'SELL'; // Probabilitas acak
            const change = (Math.random() * 0.4).toFixed(2);
            
            if (direction === 'BUY') {
                basePrice += parseFloat(change);
                buyCount++;
            } else {
                basePrice -= parseFloat(change);
            }
            totalCount++;

            // Memicu tembakan pasukan di 3D
            spawnUnit(direction);

            // Update UI Teks
            document.getElementById('live-price').innerText = `$${basePrice.toFixed(2)}`;
            
            const buyRate = Math.round((buyCount / totalCount) * 100);
            document.getElementById('buy-rate').innerText = `${buyRate}%`;
            document.getElementById('sell-rate').innerText = `${100 - buyRate}%`;

        }, 300); // Menembak/mengupdate setiap 300ms (mirip pergerakan emas asli)

        // Selesaikan masalah responsivitas layar HP
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
